<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" fill="none">
  <defs>
    <!-- Premium Gold Gradients -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E7C4" />
      <stop offset="50%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#9A7B2C" />
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <dropShadow dx="0" dy="0" stdDeviation="6" flood-color="#C9A84C" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Group with transformation -->
  <g transform="translate(10, 5)">
    <!-- A-shaped Book Symbol (Modern Monogram) -->
    <g filter="url(#glow)">
      <!-- Left Page of Book / Left Leg of A -->
      <path d="M 35 15 L 15 75 Q 35 68 35 30 Z" fill="url(#gold)" />
      <!-- Right Page of Book / Right Leg of A -->
      <path d="M 35 15 L 55 75 Q 35 68 35 30 Z" fill="url(#silver)" opacity="0.9" />
      <!-- Central Book spine / Crossbar of A -->
      <path d="M 23 52 C 30 50 40 50 47 52" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" />
      <!-- Glow Dot / Star at top of A -->
      <polygon points="35,3 37,8 42,8 38,11 39,16 35,13 31,16 32,11 28,8 33,8" fill="#FFFFFF" />
    </g>

    <!-- Typographic Brand Name APEX -->
    <text x="80" y="48" fill="url(#silver)" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="34" font-weight="800" letter-spacing="0.14em">APEX</text>
    <text x="80" y="76" fill="url(#gold)" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.22em">LEARN • GROW • LEAD • TRANSFORM</text>
    <text x="210" y="48" fill="#C9A84C" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em" opacity="0.8">|</text>
    <text x="230" y="45" fill="rgba(255,255,255,0.5)" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.06em">EDUCATION OPERATING SYSTEM</text>
  </g>
</svg>
